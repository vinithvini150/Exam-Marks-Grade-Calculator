<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading Web Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main">
        <div class="heading">
            <h1>Grading Website</h1>
        </div>

        <div class="studdet">
            <div class="studentname">
                <label for="stuname">Student Name</label>
                <input type="text" id="stuname" class="form-control me-2" type="search" placeholder="Enter Your Name">
            </div>

            <div class="studentgrade">
                <label for="stugd">Student Grade</label>
                <select name="Select" id="std" class="btn btn-secondary btn-sm dropdown-toggle" type="button"
                    data-bs-toggle="dropdown" aria-expanded="false">
                    <option>6 STD</option>
                    <option>7 STD</option>
                    <option>8 STD</option>
                    <option>9 STD</option>
                    <option>10 STD</option>
                    <option>11 STD</option>
                    <option>12 STD</option>

                </select>
            </div>
        </div>
        <div class="table-1">
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col" id="h">SI NO</th>
                        <th scope="col" id="h">Subject Name</th>
                        <th scope="col" id="h">Total Marks</th>
                        <th scope="col" id="h">Obtained Marks</th>
                        <th scope="col" id="h">Grade Calculated</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th scope="row">1</th>
                        <td id="sub-1"> Maths </td>
                        <td id="tmark">100</td>
                        <td><input id="mark-1" type="text" class="form-control me-2" type="search"
                                placeholder="Your Marks"></td>
                        <td>
                            <p id="grade-1">-</p>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">2</th>
                        <td id="sub-2"> Science </td>
                        <td>100</td>
                        <td><input id="mark-2" type="text" class="form-control me-2" type="search"
                                placeholder="Your Marks"></td>
                        <td>
                            <p id="grade-2">-</p>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">3</th>
                        <td id="sub-3"> Social Science </td>
                        <td>100</td>
                        <td><input id="mark-3" type="text" class="form-control me-2" type="search"
                                placeholder="Your Marks"></td>
                        <td>
                            <p id="grade-3">-</p>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">4</th>
                        <td id="sub-4"> Computer Science</td>
                        <td>100</td>
                        <td><input id="mark-4" type="text" class="form-control me-2" type="search"
                                placeholder="Your Marks"></td>
                        <td>
                            <p id="grade-4">-</p>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
        <div class="btn">
            <button id="btn" type="button" class="btn btn-primary">Check</button>
        </div>

    </div>












    <script src="script.js"></script>
</body>

</html>
